[child]
name = "slate-manager"
version = "0.2.0"
description = "Slate full-WIT child scaffold"
kind = "child"
role = "app"
patina_min = "0.64.0"

[child.ingress]
mode = "wit-only"

[child.contract]
default = "patina:slate/control@0.1.0.list-work"
allow = [
  "patina:slate/control@0.1.0.list-work",
  "patina:slate/control@0.1.0.ready-work",
  "patina:slate/control@0.1.0.blocked-work",
  "patina:slate/control@0.1.0.next-work",
  "patina:slate/control@0.1.0.show-work",
  "patina:slate/control@0.1.0.history-work",
  "patina:slate/control@0.1.0.create-work",
  "patina:slate/control@0.1.0.set-work",
  "patina:slate/control@0.1.0.promote-work",
  "patina:slate/control@0.1.0.activate-work",
  "patina:slate/control@0.1.0.check-work",
  "patina:slate/control@0.1.0.pause-work",
  "patina:slate/control@0.1.0.resume-work",
  "patina:slate/control@0.1.0.block-work",
  "patina:slate/control@0.1.0.abandon-work",
  "patina:slate/control@0.1.0.rename-work",
  "patina:slate/control@0.1.0.reopen-work",
  "patina:slate/control@0.1.0.split-work",
  "patina:slate/control@0.1.0.prompt-work",
  "patina:slate/control@0.1.0.handoff-work",
  "patina:slate/control@0.1.0.packet-work",
  "patina:slate/control@0.1.0.complete-work",
  "patina:slate/control@0.1.0.archive-work",
  "patina:slate/control@0.1.0.dispatch",
  "patina:slate/control@0.1.0.list-specs",
  "patina:slate/control@0.1.0.next-specs",
  "patina:slate/control@0.1.0.check-spec",
  "patina:slate/control@0.1.0.show-spec",
  "patina:slate/control@0.1.0.prompt-spec",
  "patina:slate/control@0.1.0.handoff-spec",
  "patina:slate/control@0.1.0.packet-spec",
  "patina:slate/control@0.1.0.complete-spec",
  "patina:slate/control@0.1.0.archive-spec",
]

[needs]
toys = ["logging", "measure", "git", "filesystem"]

[needs.scopes.filesystem]
path = "/"
