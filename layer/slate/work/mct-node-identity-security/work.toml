id = "mct-node-identity-security"
title = "Build node identity and security model"
kind = "build"
status = "blocked"
human_request = "Define and implement MCT node identity, peer admission, caller authentication, child/component authorization, and WIT interface exposure policy across local and Iroh boundaries."
allium_anchors = ["MctPeerBinding", "MctPeerAdmissionDecision", "MctIrohPeerBindingAuthority"]
user_alignment = "User wants a real Iroh substrate and explicit authority without over-engineering; node/security policy should be first-class rather than buried inside transport code. User agreed that Iroh EndpointId is transport identity only and MCT needs explicit observed binding to Node/Vision/admission/policy authority."
belief_refs = ["iroh-endpointid-is-transport-identity"]
proof_plan = [
    "[ ] Unknown or untrusted peer/caller requests are denied with typed reasons and kernel observations.",
    "[ ] Iroh EndpointId alone never authorizes an MCT peer action; an active MctPeerBinding is required for peer admission.",
    "[ ] Peer binding creation, admission, rejection, revocation, expiry, and stale-policy denial are represented as observations.",
    "[ ] Authorized node/child/interface identities can be represented without raw strings at the authority boundary.",
    "[ ] Iroh, local control, JVM bridge, and process/WASM adapters share policy decisions instead of duplicating security logic.",
]
closure_evidence = []
blocked_by = [
    "mct-allium-foundation",
    "mct-kernel-crate",
    "mct-storage-core",
]
implementation_plan = [
    "[ ] Define Mother/Node/User/Interface/Child/Component caller identities and their trust roots.",
    "[ ] Define MctPeerBinding as the authority record binding Iroh EndpointId to MCT Node, Vision scope, allowed ALPNs, issuer, policy revision, and time bounds.",
    "[ ] Define peer admission and local caller authentication rules for UDS/HTTP/Iroh/JVM/process boundaries.",
    "[ ] Define component/WIT-interface exposure policy and how grants are derived from manifests and assignments.",
    "[ ] Implement fail-closed authorization checks and observations that other adapters call into rather than reimplementing policy.",
    "[ ] Ensure Iroh endpoint hooks and relay access control call into or mirror MCT peer binding decisions rather than becoming a separate authority model.",
]
