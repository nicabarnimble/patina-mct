[changelog]
header = """
# Changelog

All notable changes to MCT are documented here. MCT follows semantic versioning before 1.0 without claiming API stability.

"""
body = """
{% if version %}## [{{ version | trim_start_matches(pat=\"v\") }}] - {{ timestamp | date(format=\"%Y-%m-%d\") }}{% else %}## [Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute=\"group\") %}

### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | split(pat=\"\\n\") | first | upper_first | trim }}{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/nicabarnimble/patina-mct/pull/{{ commit.remote.pr_number }})){% else %} ([{{ commit.id | truncate(length=7, end=\"\") }}](https://github.com/nicabarnimble/patina-mct/commit/{{ commit.id }})){% endif %}
{% endfor %}
{% endfor %}
"""
footer = """
<!-- generated by git-cliff; edit cliff.toml or commit metadata, not released sections -->
"""
trim = true
postprocessors = [
  { pattern = "<REPO>", replace = "https://github.com/nicabarnimble/patina-mct" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^fix\\(security\\)", group = "Security" },
  { body = "(?i)^Security:", group = "Security" },
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^(perf|refactor|docs|build|ci)", group = "Changed" },
  { message = "^(test|chore|session)", skip = true },
  { message = ".*", skip = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+(?:-[0-9A-Za-z.-]+)?$"
skip_tags = "^session-"
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "nicabarnimble"
repo = "patina-mct"
